services:
  openhelm:
    build: .
    container_name: openhelm
    restart: unless-stopped
    volumes:
      # Mount your config file (required).
      # Copy openhelm.example.toml to openhelm.toml and fill in your values.
      - ./openhelm.toml:/root/openhelm.toml:ro
      # Persist audit logs across container restarts
      - openhelm-data:/root/.local/share/openhelm

volumes:
  openhelm-data:
