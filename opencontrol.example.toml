# OpenControl configuration
# Copy to $HOME/opencontrol.toml and fill in your values.

[daemon]
socket_path = "/tmp/opencontrol.sock"
log_level = "info"

[ai]
# OpenAI-compatible endpoint — use https://openrouter.ai/api/v1 for OpenRouter
api_url = "https://api.openai.com/v1"
api_key = "sk-..."
model = "gpt-4o"
system_prompt = """
You are a helpful assistant with access to tools on the host system.
Use them carefully and only when necessary.
"""
session_timeout_minutes = 30

[telegram]
bot_token = "..."

# ─── Profiles ─────────────────────────────────────────────────────────────────
# Each paired user must reference one of these profiles.
# Profiles control which tools are available and which paths are accessible.

[profiles.readonly]
# system_prompt = "You are a read-only assistant."  # optional override
# model = "gpt-4o-mini"                             # optional model override

[profiles.readonly.permissions]
fs = true

[profiles.readonly.fs]
read     = ["/home/alice/docs"]
read_dir = ["/home/alice/docs"]
write    = []   # empty = operation disabled
mkdir    = []

[profiles.developer]
system_prompt = "You are a coding assistant. Help with code, files, and projects."

[profiles.developer.permissions]
fs = true

[profiles.developer.fs]
read     = ["/home/alice/projects"]
read_dir = ["/home/alice/projects"]
write    = ["/home/alice/projects"]
mkdir    = ["/home/alice/projects"]

# ─── Paired users ─────────────────────────────────────────────────────────────
# Added automatically via `opencontrol pair approve <id> --profile <name>`

[[telegram.users]]
telegram_id = 123456789
name = "Alice"
profile = "developer"

[audit]
log_path = "/home/alice/.local/share/opencontrol/audit.log"
